<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Product Display</title>
	<style>
		table {
			width: 50%;
			border-collapse: collapse;
			margin-top: 20px;
		}

		th,
		td {
			border: 1px solid #ddd;
			padding: 8px;
			text-align: left;
		}

		th {
			background-color: #f2f2f2;
		}

		.error {
			color: red;
			font-weight: bold;
		}
	</style>
</head>

<body>
	<h1>Product Data</h1>

	{% if error %}
	<p class="error">{{ error }}</p>
	{% else %}
	<table>
		<thead>
			<tr>
				<th>Name</th>
				<th>Category</th>
				<th>Price</th>
			</tr>
		</thead>
		<tbody>
			{% for product in products %}
			<tr>
				<td>{{ product.name }}</td>
				<td>{{ product.category }}</td>
				<td>${{ product.price }}</td>
			</tr>
			{% endfor %}
		</tbody>
	</table>
	{% endif %}

	<br>
	<a href="/products?source=json">View JSON Source</a> |
	<a href="/products?source=csv">View CSV Source</a>
</body>

</html>
